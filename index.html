<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sermik's funny dnd thingymajik</title>
        <link rel="stylesheet" href="style.css">
        <script src="mainscript.js" defer></script>
    </head>
    <body>
        <div class="header">
            <div class="header-container">
                <div class="creature-container">
                    <button class="add-creature">+</button>
                    <div class="creature-popup" hidden>
                        <button class="popup-option" data-action="new">New</button>
                        <button class="popup-option" data-action="load">Load</button>
                    </div>
                    <div class="new-popup" hidden>
                        <input type="text" class="creature-name" placeholder="Creature Name">
                    </div>
                    <div class="load-popup" hidden>
                        <ul class="creature-list"></ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="main-container">
            <div class="left-panel">
                
                <div class="stats-container" id="stats">
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">DEFENSE</span>
                            <input type="number" class="stat-value" id="defense-value" value="0">
                        </div>
                        <div class="stat-input-row">
                            <input type="number" class="stat-bonus" id="defense-bonus" value="0">
                            <span class="stat-bonus-label">%</span>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">RESISTANCE</span>
                            <input type="number" class="stat-value" id="resistance-value" value="0">
                        </div>
                        <div class="stat-input-row">
                            <input type="number" class="stat-bonus" id="resistance-bonus" value="0">
                            <span class="stat-bonus-label">%</span>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">ATTACK</span>
                            <input type="number" class="stat-value" id="attack-value" value="0">
                        </div>
                        <div class="stat-input-row">
                            <input type="number" class="stat-bonus" id="attack-bonus" value="0">
                            <span class="stat-bonus-label">%</span>
                        </div>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">MAGIC</span>
                            <input type="number" class="stat-value" id="magic-value" value="0">
                        </div>
                        <div class="stat-input-row">
                            <input type="number" class="stat-bonus" id="magic-bonus" value="0">
                            <span class="stat-bonus-label">%</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="output-container">
                    <div class="output-content">
                        <div class="output-circles">
                            <div class="output-row">
                                <div class="incoming-damage-name output-item">
                                    <input type="number" class="incoming-damage-value" value="0">
                                </div>
                            </div>

                            <div class="output-row">
                                <div class="percentage-dmg output-item">
                                    <input type="number" class="percentage-dmg-value" value="0">
                                    <span class="percentage-dmg-label">%</span>
                                </div>
                            </div>
                            <button class="type-damage"></button>
                            <button class="calculate-damage">Calculate</button>
                            <button class="save-stats" data-action="save">Save</button>
                        </div>
                        <div class="result-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
