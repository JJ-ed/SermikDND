<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Sermik's funny dnd thingymajik</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="header">
            <div class="header-container">
                <button class="add-creature">+</button>
            </div>
        </div>
        <div class="main-container">
            <div class="left-panel">
                <div class="stats-container" id="stats">
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">DEFENSE</span>
                            <input type="number" class="stat-value" value="0">
                        </div>
                        <span class="stat-bonus">0%</span>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">RESISTANCE</span>
                            <span class="stat-value">10</span>
                        </div>
                        <span class="stat-bonus">0%</span>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">ATTACK</span>
                            <span class="stat-value">10</span>
                        </div>
                        <span class="stat-bonus">0%</span>
                    </div>
                    <div class="stat-row">
                        <div class="stat-main">
                            <span class="stat-name">MAGIC</span>
                            <span class="stat-value">10</span>
                        </div>
                        <span class="stat-bonus">0%</span>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <div class="output-container">
                    <div class="output-content">
                        <div class="output-header">
                            <h2>Damage Output</h2>
                        </div>
                        <div class="output-body">
                            <div class="incoming-damage-name output-item">
                                <span class="incoming-damage-value">10</span>
                            </div>
                            <!-- <div class="magic-circle"></div> -->
                            <div class="percentage-dmg output-item">
                                <span class="percentage-dmg-value">10</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
